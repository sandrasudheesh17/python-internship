<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Task Manager</title> 

    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head> 
<body> 

    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark"> 
        <div class="container"> 

            <!-- Website name/logo -->
            <a class="navbar-brand" href="{% url 'dashboard' %}">Task Manager</a> 

            <div class="collapse navbar-collapse"> 
                <ul class="navbar-nav ms-auto"> 

                    <!-- If user is logged in -->
                    {% if user.is_authenticated %} 

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                        </li> 

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'task_list' %}">Tasks</a>
                        </li> 

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'task_create' %}">Add Task</a>
                        </li> 

                        <!-- Logout button -->
                        <li class="nav-item"> 
                            <form method="post" action="{% url 'logout' %}"> 
                                {% csrf_token %}  <!-- Security token -->
                                <button type="submit" class="btn btn-link nav-link" style="text-decoration: none;">
                                    Logout
                                </button> 
                            </form> 
                        </li> 

                    <!-- If user is NOT logged in -->
                    {% else %} 

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                        </li> 

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'signup' %}">Signup</a>
                        </li> 

                    {% endif %} 

                </ul> 
            </div> 
        </div> 
    </nav> 

    <!-- Page content will be inserted here from other templates -->
    <div class="container mt-4"> 
        {% block content %} 
        {% endblock %} 
    </div> 

</body> 
</html>
